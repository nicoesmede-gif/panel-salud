function loadState() {
  try {
    const sv = parseInt(localStorage.getItem('hd_version') || '0');
    const base = buildBase();
    const bdk = new Set(INIT_DATES.map(d => d.k));
    if (sv < DATA_VERSION) {
      const saved = JSON.parse(localStorage.getItem('hd_vals') || '{}');
      Object.keys(saved).forEach(id => {
        const ex = Object.fromEntries(Object.entries(saved[id] || {}).filter(([dk]) => !bdk.has(dk)));

          ...(base[id] || {}),
          ...ex
        };
      });
      const sd = JSON.parse(localStorage.getItem('hd_dates') || 'null');
      const ex = (sd || []).filter(d => !bdk.has(d.k));
      const dates = [...INIT_DATES, ...ex];
      localStorage.setItem('hd_version', DATA_VERSION);
      localStorage.setItem('hd_vals', JSON.stringify(base));
      localStorage.setItem('hd_dates', JSON.stringify(dates));
      return {
        vals: base,
        dates
      };
    } else {
      const saved = JSON.parse(localStorage.getItem('hd_vals') || '{}');
      const sd = JSON.parse(localStorage.getItem('hd_dates') || JSON.stringify(INIT_DATES));
      const merged = {
        ...saved
      };
      Object.keys(base).forEach(id => {
        merged[id] = {
          ...(merged[id] || {}),
          ...base[id]
        };
      });
      return {
        vals: merged,
        dates: sd
      };
    }
  } catch (e) {
    return {
      vals: buildBase(),
      dates: INIT_DATES
    };
  }
}
