function st(v,lo,hi){
  if(v==null)return 'no';
  if(lo!=null&&v<lo)return(lo-v)/lo>0.15?'re':'am';
  if(hi!=null&&v>hi)return(v-hi)/hi>0.15?'re':'am';
  return 'gr';
}
function fmt(v){
  if(v==null)return null;
  if(typeof v!=='number')return v;
  return Number.isInteger(v)?String(v):v.toFixed(1);
}
function refStr(lo,hi){
  if(lo!=null&&hi!=null)return `${lo} – ${hi}`;
  if(lo!=null)return `> ${lo}`;
  if(hi!=null)return `< ${hi}`;
  return null;
}

/* ── REF BAR ── */
function RefBarInline({lo,hi,lastV,fullWidth}){
  if(lo==null&&hi==null)return null;
  let dMin,dMax;
  if(lo!=null&&hi!=null){const sp=hi-lo;dMin=lo-sp*0.55;dMax=hi+sp*0.55;}
  else if(hi!=null){dMin=0;dMax=hi*1.9;}
  else{dMin=0;dMax=lo*1.9;}
  const r=dMax-dMin||1;
  const pct=v=>Math.max(1,Math.min(99,((v-dMin)/r)*100));
  const loP=lo!=null?pct(lo):0;
  const hiP=hi!=null?pct(hi):100;
  const valP=lastV!=null?pct(lastV):null;
  const s2=lastV!=null?st(lastV,lo,hi):'gr';
  const h=fullWidth?9:5;
  const dotSize=fullWidth?15:10;
  return(
    <div style={{position:'relative',height:h,background:C.bdr,borderRadius:h/2,
      marginTop:4,width:fullWidth?'100%':96}}>
      <div style={{position:'absolute',left:`${loP}%`,width:`${Math.max(0,hiP-loP)}%`,
        top:0,height:'100%',background:'rgba(52,211,153,0.32)',borderRadius:h/2}}/>
      {valP!=null&&(
        <div style={{position:'absolute',left:`${valP}%`,top:'50%',
          transform:'translate(-50%,-50%)',width:dotSize,height:dotSize,
          borderRadius:'50%',background:SC[s2],border:`2px solid ${C.bg2}`,zIndex:2}}/>
      )}
    </div>
  );
}

/* ── SPARKLINE ── */
function Spark({pts,lo,hi,W=80,H=32}){
  const vals=pts.map(p=>p.v).filter(v=>v!=null);
  if(vals.length<2)return <span style={{color:C.mu,fontSize:10}}>—</span>;
  const pad=4;
  const all=[...vals,lo,hi].filter(v=>v!=null);
  const mn=Math.min(...all),mx=Math.max(...all),rng=mx-mn||1;
  const cx=i=>pad+(i/(vals.length-1))*(W-2*pad);
  const cy=v=>(H-pad)-((v-mn)/rng)*(H-2*pad);
  const lastS=st(vals[vals.length-1],lo,hi);
  return(
    <svg width={W} height={H} style={{display:'block',overflow:'visible'}}>
      {lo!=null&&hi!=null&&(
        <rect x={pad} y={cy(hi)} width={W-2*pad} height={Math.max(cy(lo)-cy(hi),1)}
          fill="rgba(52,211,153,0.07)" rx={2}/>
      )}
      <polyline fill="none" stroke={SC[lastS]} strokeWidth={1.5} strokeLinejoin="round"
        points={vals.map((v,i)=>`${cx(i).toFixed(1)},${cy(v).toFixed(1)}`).join(' ')}/>
      {vals.map((v,i)=>(
        <circle key={i} cx={cx(i)} cy={cy(v)} r={i===vals.length-1?3:2}
          fill={SC[st(v,lo,hi)]} strokeWidth={i===vals.length-1?1.5:0}
          stroke={i===vals.length-1?C.bg2:'none'}/>
      ))}
    </svg>
  );
}

/* ── PERSISTENCIA localStorage ── */
function buildBase(){
  const v={};
  NM_DEF.forEach(m=>{v[m[0]]={...(m[6]||{})};});
  QM_DEF.forEach(m=>{v[m[0]]={...(m[3]||{})};});
  return v;
}

function loadState(){
  try{
    const savedVer=parseInt(localStorage.getItem('hd_version')||'0');
    const base=buildBase();
    const baseDateKeys=new Set(INIT_DATES.map(d=>d.k));
    if(savedVer<DATA_VERSION){
      /* Nueva versión HTML: usar base nueva + conservar fechas extra del user */
      const savedVals=JSON.parse(localStorage.getItem('hd_vals')||'{}');
      Object.keys(savedVals).forEach(id=>{
        const extras=Object.fromEntries(
          Object.entries(savedVals[id]||{}).filter(([dk])=>!baseDateKeys.has(dk))
        );
        if(Object.keys(extras).length>0) base[id]={...(base[id]||{}),...extras};
      });
      const savedDates=JSON.parse(localStorage.getItem('hd_dates')||'null');
      const extraDates=(savedDates||[]).filter(d=>!baseDateKeys.has(d.k));
      const dates=[...INIT_DATES,...extraDates];
      localStorage.setItem('hd_version',DATA_VERSION);
      localStorage.setItem('hd_vals',JSON.stringify(base));
      localStorage.setItem('hd_dates',JSON.stringify(dates));
      return{vals:base,dates};
    }else{
      const savedVals=JSON.parse(localStorage.getItem('hd_vals')||'{}');
      const savedDates=JSON.parse(localStorage.getItem('hd_dates')||JSON.stringify(INIT_DATES));
      /* Merge base over saved (in case HTML updated same version by mistake) */
      const merged={...savedVals};
      Object.keys(base).forEach(id=>{
        merged[id]={...(merged[id]||{}),...base[id]};
      });
      return{vals:merged,dates:savedDates};
    }
  }catch(e){return{vals:buildBase(),dates:INIT_DATES};}
}

function saveState(vals,dates){
  try{
    localStorage.setItem('hd_vals',JSON.stringify(vals));
    localStorage.setItem('hd_dates',JSON.stringify(dates));
    localStorage.setItem('hd_version',DATA_VERSION);
  }catch(e){}
}

function alertsForCat(catId,vals,dates){
  let a=0,w=0;
  NM_DEF.filter(m=>m[1]===catId).forEach(m=>{
    const ld=dates.slice().reverse().find(d=>vals[m[0]]?.[d.k]!=null);
    if(!ld)return;
    const s=st(vals[m[0]][ld.k],m[4],m[5]);
    if(s==='re')a++;else if(s==='am')w++;
  });
  return{alerts:a,warns:w};
}

/* ── DESKTOP ROW ── */
function DRow({m,dates,vals}){
  const[id,,label,unit,lo,hi,,note]=m;
  const mv=vals[id]||{};
  const pts=dates.map(d=>({k:d.k,v:mv[d.k]??null}));
  const avs=pts.map(p=>p.v).filter(v=>v!=null);
  const ld=dates.slice().reverse().find(d=>mv[d.k]!=null);
  const lv=ld?mv[ld.k]:null;
  const s2=lv!=null?st(lv,lo,hi):'no';
  const rs=refStr(lo,hi);
  let trend=null;
  if(avs.length>=2){const d=avs[avs.length-1]-avs[avs.length-2];if(Math.abs(d/(avs[avs.length-2]||1))>0.02)trend=d>0?'↑':'↓';}
  return(
    <tr>
      <td style={{padding:'9px 12px',background:C.bg2,borderRadius:'9px 0 0 9px',
        borderLeft:`3px solid ${SC[s2]}`,verticalAlign:'top',minWidth:180}}>
        <div style={{color:C.hi,fontSize:13,fontWeight:600}}>{label}</div>
        {note&&<div style={{color:C.am,fontSize:10,marginTop:2,lineHeight:1.3}}>{note}</div>}
        {rs&&<div style={{marginTop:5}}>
          <div style={{display:'flex',gap:6,alignItems:'baseline'}}>
            <span style={{color:C.mu,fontSize:10.5,fontWeight:500}}>{rs}</span>
            <span style={{color:C.mu,fontSize:9.5,opacity:.7}}>{unit}</span>
          </div>
          <RefBarInline lo={lo} hi={hi} lastV={lv} fullWidth={false}/>
        </div>}
      </td>
      {dates.map(d=>{
        const v=mv[d.k];
        const cs=v!=null?st(v,lo,hi):'no';
        return(
          <td key={d.k} style={{padding:'9px 10px',background:C.bg2,textAlign:'right',verticalAlign:'middle'}}>
            {v!=null
              ?<span style={{color:SC[cs],fontWeight:700,fontSize:14,background:SB[cs],
                borderRadius:7,padding:'3px 9px',display:'inline-block',letterSpacing:'-0.2px'}}>
                {fmt(v)}
              </span>
              :<span style={{color:C.bdr,fontSize:13}}>—</span>
            }
          </td>
        );
      })}
      <td style={{padding:'9px 10px',background:C.bg2,verticalAlign:'middle'}}>
        <Spark pts={pts} lo={lo} hi={hi} W={76} H={30}/>
      </td>
      <td style={{padding:'9px 12px',background:C.bg2,borderRadius:'0 9px 9px 0',
        verticalAlign:'middle',whiteSpace:'nowrap'}}>
        {lv!=null&&<span style={{color:SC[s2],background:SB[s2],borderRadius:20,
          padding:'4px 11px',fontSize:11,fontWeight:700,display:'inline-flex',alignItems:'center',gap:4}}>
          {SEM[s2]}{trend&&<span style={{fontSize:12}}>{trend}</span>} {SLB[s2]}
        </span>}
      </td>
    </tr>
  );
}

/* ── QUAL ROW (desktop) ── */
function QRow({m,dates,vals}){
  const[id,,label]=m;
  const iv=m[3]||{};const gv=m[4]||[];const note=m[5];
  const stored=vals[id];
  const mv=(stored&&Object.keys(stored).length>0)?stored:iv;
  const isG=v=>v!=null&&gv.some(g=>v.toLowerCase().includes(g.toLowerCase()));
  const anyBad=dates.some(d=>mv[d.k]!=null&&!isG(mv[d.k]));
  const s2=anyBad?'re':dates.some(d=>mv[d.k]!=null&&isG(mv[d.k]))?'gr':'no';
  return(
    <tr>
      <td style={{padding:'8px 12px',background:C.bg2,borderRadius:'9px 0 0 9px',
        borderLeft:`3px solid ${SC[s2]}`}}>
        <div style={{color:C.hi,fontSize:13,fontWeight:500}}>{label}</div>
        {note&&<div style={{color:C.am,fontSize:10,marginTop:2}}>{note}</div>}
      </td>
      {dates.map(d=>{
        const v=mv[d.k];const g=isG(v);
        return(
          <td key={d.k} style={{padding:'8px 10px',background:C.bg2}}>
            {v!=null
              ?<span style={{color:g?C.gr:C.re,background:g?C.grd:C.red2,
                borderRadius:7,padding:'3px 9px',fontSize:11,fontWeight:600,display:'inline-block'}}>
                {g?'✓':'⚠'} {v}
              </span>
              :<span style={{color:C.bdr,fontSize:13}}>—</span>
            }
          </td>
        );
      })}
      <td style={{padding:'8px 12px',background:C.bg2}}/>
      <td style={{padding:'8px 12px',background:C.bg2,borderRadius:'0 9px 9px 0'}}/>
    </tr>
  );
}

                <span>{cat.label}</span>
                {b.alerts>0&&<span style={{background:C.re,color:'#fff',borderRadius:8,
                  padding:'0 5px',fontSize:10,fontWeight:700}}>{b.alerts}</span>}
                {!b.alerts&&b.warns>0&&<span style={{background:C.am,color:'#000',borderRadius:8,
                  padding:'0 5px',fontSize:10,fontWeight:700}}>{b.warns}</span>}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'12px 12px 80px',WebkitOverflowScrolling:'touch'}}>
        {selCat==='ecg'&&ECG_DEF.map((e,i)=><ECGCard key={i} e={e}/>)}
        {catNMs.map(m=><MCard key={m[0]} m={m} dates={dates} vals={vals}/>)}
        {catQMs.length>0&&catNMs.length>0&&(
          <div style={{color:C.mu,fontSize:10,textTransform:'uppercase',letterSpacing:'0.7px',
            fontWeight:600,margin:'16px 0 8px 4px'}}>Marcadores cualitativos</div>
        )}
        {catQMs.map(m=><MQCard key={m[0]} m={m} dates={dates} vals={vals}/>)}
      </div>

      <div style={{position:'fixed',bottom:0,left:0,right:0,background:C.bg1,
        borderTop:`1px solid ${C.bdr}`,padding:'10px 14px',display:'flex',gap:10}}>
        <button onClick={()=>setShowAddDate(true)} style={{flex:1,background:C.bg3,
          border:`1px solid ${C.bdr}`,borderRadius:12,color:C.txt,padding:'11px',
          fontSize:13,cursor:'pointer',fontWeight:500}}>📅 Nueva fecha</button>
        <button onClick={()=>setShowAdd(true)} style={{flex:2,background:C.ac,border:'none',
          borderRadius:12,color:'#fff',padding:'11px',fontSize:14,cursor:'pointer',fontWeight:700}}>
          ➕ Agregar valor
        </button>
      </div>
      {showAdd&&<AddModal dates={dates} onAdd={addVal} onClose={()=>setShowAdd(false)}/>}
      {showAddDate&&<AddDateModal onAdd={addDate} onClose={()=>setShowAddDate(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<HealthDashboard/>);
</script>
</body>
</html>
